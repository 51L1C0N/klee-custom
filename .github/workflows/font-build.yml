name: Build Klee-Custom Font

on:
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # 指定具體版本更穩定

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fonttools requests

      - name: Run font surgery script
        run: python build_font.py

      - name: Upload font artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Klee-Custom-Font
          path: Klee-Custom-Regular.ttf
